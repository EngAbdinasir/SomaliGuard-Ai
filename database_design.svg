<svg width="1500" height="980" viewBox="0 0 1500 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M2 2L10 6L2 10Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 800 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #64748b; }
      .table { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; filter: url(#shadow); }
      .head-users { fill: #2563eb; }
      .head-auth { fill: #7c3aed; }
      .head-history { fill: #0891b2; }
      .head-image { fill: #16a34a; }
      .head-result { fill: #dc2626; }
      .head-text { font: 800 18px Arial, sans-serif; fill: #ffffff; }
      .field { font: 500 15px Arial, sans-serif; fill: #334155; }
      .field-key { font: 800 15px Arial, sans-serif; fill: #0f172a; }
      .type { font: 500 13px Arial, sans-serif; fill: #64748b; }
      .pk { fill: #fef3c7; stroke: #f59e0b; }
      .fk { fill: #e0f2fe; stroke: #0284c7; }
      .normal { fill: #f8fafc; stroke: #e2e8f0; }
      .rel { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .rel-label { font: 700 13px Arial, sans-serif; fill: #475569; }
      .legend-title { font: 800 15px Arial, sans-serif; fill: #0f172a; }
      .legend-text { font: 500 14px Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="980"/>
  <text x="70" y="68" class="title">SomaliGuard AI Database Design</text>
  <text x="70" y="98" class="subtitle">Entity relationship diagram for users, authentication, predictions, uploaded images, and classification records</text>

  <!-- users -->
  <g transform="translate(70 170)">
    <rect class="table" width="360" height="390" rx="16"/>
    <path class="head-users" d="M16 0H344C352.837 0 360 7.163 360 16V62H0V16C0 7.163 7.163 0 16 0Z"/>
    <text x="24" y="39" class="head-text">users</text>
    <g transform="translate(20 86)">
      <rect class="pk" width="320" height="34" rx="8"/>
      <text x="12" y="22" class="field-key">PK id</text>
      <text x="228" y="22" class="type">INT</text>
    </g>
    <g transform="translate(20 128)">
      <rect class="normal" width="320" height="34" rx="8"/>
      <text x="12" y="22" class="field">full_name</text>
      <text x="190" y="22" class="type">VARCHAR(100)</text>
    </g>
    <g transform="translate(20 170)">
      <rect class="normal" width="320" height="34" rx="8"/>
      <text x="12" y="22" class="field">email UNIQUE</text>
      <text x="190" y="22" class="type">VARCHAR(150)</text>
    </g>
    <g transform="translate(20 212)">
      <rect class="normal" width="320" height="34" rx="8"/>
      <text x="12" y="22" class="field">password_hash</text>
      <text x="190" y="22" class="type">VARCHAR(255)</text>
    </g>
    <g transform="translate(20 254)">
      <rect class="normal" width="320" height="34" rx="8"/>
      <text x="12" y="22" class="field">profile_picture</text>
      <text x="190" y="22" class="type">VARCHAR(255)</text>
    </g>
    <g transform="translate(20 296)">
      <rect class="normal" width="320" height="34" rx="8"/>
      <text x="12" y="22" class="field">role</text>
      <text x="230" y="22" class="type">VARCHAR(50)</text>
    </g>
    <g transform="translate(20 338)">
      <rect class="normal" width="320" height="34" rx="8"/>
      <text x="12" y="22" class="field">is_active, created_at</text>
      <text x="204" y="22" class="type">BOOL, TIME</text>
    </g>
  </g>

  <!-- password reset tokens -->
  <g transform="translate(570 135)">
    <rect class="table" width="390" height="300" rx="16"/>
    <path class="head-auth" d="M16 0H374C382.837 0 390 7.163 390 16V62H0V16C0 7.163 7.163 0 16 0Z"/>
    <text x="24" y="39" class="head-text">password_reset_tokens</text>
    <g transform="translate(20 86)">
      <rect class="pk" width="350" height="34" rx="8"/>
      <text x="12" y="22" class="field-key">PK id</text>
      <text x="260" y="22" class="type">INT</text>
    </g>
    <g transform="translate(20 128)">
      <rect class="fk" width="350" height="34" rx="8"/>
      <text x="12" y="22" class="field-key">FK user_id</text>
      <text x="260" y="22" class="type">INT</text>
    </g>
    <g transform="translate(20 170)">
      <rect class="normal" width="350" height="34" rx="8"/>
      <text x="12" y="22" class="field">token UNIQUE</text>
      <text x="220" y="22" class="type">VARCHAR(255)</text>
    </g>
    <g transform="translate(20 212)">
      <rect class="normal" width="350" height="34" rx="8"/>
      <text x="12" y="22" class="field">expires_at, used</text>
      <text x="224" y="22" class="type">DATETIME, BOOL</text>
    </g>
    <g transform="translate(20 254)">
      <rect class="normal" width="350" height="34" rx="8"/>
      <text x="12" y="22" class="field">created_at</text>
      <text x="250" y="22" class="type">TIMESTAMP</text>
    </g>
  </g>

  <!-- prediction history -->
  <g transform="translate(570 525)">
    <rect class="table" width="410" height="390" rx="16"/>
    <path class="head-history" d="M16 0H394C402.837 0 410 7.163 410 16V62H0V16C0 7.163 7.163 0 16 0Z"/>
    <text x="24" y="39" class="head-text">prediction_history</text>
    <g transform="translate(20 86)">
      <rect class="pk" width="370" height="34" rx="8"/>
      <text x="12" y="22" class="field-key">PK id</text>
      <text x="284" y="22" class="type">INT</text>
    </g>
    <g transform="translate(20 128)">
      <rect class="fk" width="370" height="34" rx="8"/>
      <text x="12" y="22" class="field-key">FK user_id NULL</text>
      <text x="284" y="22" class="type">INT</text>
    </g>
    <g transform="translate(20 170)">
      <rect class="normal" width="370" height="34" rx="8"/>
      <text x="12" y="22" class="field">input_type, image_filename</text>
      <text x="240" y="22" class="type">VARCHAR</text>
    </g>
    <g transform="translate(20 212)">
      <rect class="normal" width="370" height="34" rx="8"/>
      <text x="12" y="22" class="field">original_text</text>
      <text x="296" y="22" class="type">TEXT</text>
    </g>
    <g transform="translate(20 254)">
      <rect class="normal" width="370" height="34" rx="8"/>
      <text x="12" y="22" class="field">extracted_text, cleaned_text</text>
      <text x="296" y="22" class="type">TEXT</text>
    </g>
    <g transform="translate(20 296)">
      <rect class="normal" width="370" height="34" rx="8"/>
      <text x="12" y="22" class="field">prediction, confidence</text>
      <text x="250" y="22" class="type">VARCHAR, FLOAT</text>
    </g>
    <g transform="translate(20 338)">
      <rect class="normal" width="370" height="34" rx="8"/>
      <text x="12" y="22" class="field">model_name, created_at</text>
      <text x="244" y="22" class="type">VARCHAR, TIME</text>
    </g>
  </g>

  <!-- uploaded images -->
  <g transform="translate(1080 165)">
    <rect class="table" width="350" height="300" rx="16"/>
    <path class="head-image" d="M16 0H334C342.837 0 350 7.163 350 16V62H0V16C0 7.163 7.163 0 16 0Z"/>
    <text x="24" y="39" class="head-text">uploaded_images</text>
    <g transform="translate(20 86)">
      <rect class="pk" width="310" height="34" rx="8"/>
      <text x="12" y="22" class="field-key">PK image_id</text>
      <text x="234" y="22" class="type">INT</text>
    </g>
    <g transform="translate(20 128)">
      <rect class="fk" width="310" height="34" rx="8"/>
      <text x="12" y="22" class="field-key">FK user_id</text>
      <text x="234" y="22" class="type">INT</text>
    </g>
    <g transform="translate(20 170)">
      <rect class="normal" width="310" height="34" rx="8"/>
      <text x="12" y="22" class="field">image_name</text>
      <text x="184" y="22" class="type">VARCHAR(255)</text>
    </g>
    <g transform="translate(20 212)">
      <rect class="normal" width="310" height="34" rx="8"/>
      <text x="12" y="22" class="field">image_path</text>
      <text x="184" y="22" class="type">VARCHAR(255)</text>
    </g>
    <g transform="translate(20 254)">
      <rect class="normal" width="310" height="34" rx="8"/>
      <text x="12" y="22" class="field">uploaded_at</text>
      <text x="220" y="22" class="type">TIMESTAMP</text>
    </g>
  </g>

  <!-- classification results -->
  <g transform="translate(1070 580)">
    <rect class="table" width="370" height="335" rx="16"/>
    <path class="head-result" d="M16 0H354C362.837 0 370 7.163 370 16V62H0V16C0 7.163 7.163 0 16 0Z"/>
    <text x="24" y="39" class="head-text">classification_results</text>
    <g transform="translate(20 86)">
      <rect class="pk" width="330" height="34" rx="8"/>
      <text x="12" y="22" class="field-key">PK result_id</text>
      <text x="250" y="22" class="type">INT</text>
    </g>
    <g transform="translate(20 128)">
      <rect class="fk" width="330" height="34" rx="8"/>
      <text x="12" y="22" class="field-key">FK user_id</text>
      <text x="250" y="22" class="type">INT</text>
    </g>
    <g transform="translate(20 170)">
      <rect class="fk" width="330" height="34" rx="8"/>
      <text x="12" y="22" class="field-key">FK image_id</text>
      <text x="250" y="22" class="type">INT</text>
    </g>
    <g transform="translate(20 212)">
      <rect class="normal" width="330" height="34" rx="8"/>
      <text x="12" y="22" class="field">extracted_text, cleaned_text</text>
      <text x="254" y="22" class="type">TEXT</text>
    </g>
    <g transform="translate(20 254)">
      <rect class="normal" width="330" height="34" rx="8"/>
      <text x="12" y="22" class="field">prediction_label</text>
      <text x="210" y="22" class="type">VARCHAR(50)</text>
    </g>
    <g transform="translate(20 296)">
      <rect class="normal" width="330" height="34" rx="8"/>
      <text x="12" y="22" class="field">confidence_score, created_at</text>
      <text x="226" y="22" class="type">FLOAT, TIME</text>
    </g>
  </g>

  <!-- relationship lines -->
  <path class="rel" d="M430 300 C500 300 500 285 570 285"/>
  <text x="462" y="277" class="rel-label">1 user -> many reset tokens</text>

  <path class="rel" d="M430 460 C505 460 495 653 570 653"/>
  <text x="452" y="615" class="rel-label">1 user -> many history records</text>

  <path class="rel" d="M430 360 C745 360 765 315 1080 315"/>
  <text x="675" y="340" class="rel-label">1 user -> many uploaded images</text>

  <path class="rel" d="M430 410 C750 410 750 708 1070 708"/>
  <text x="668" y="620" class="rel-label">1 user -> many classification results</text>

  <path class="rel" d="M1255 465 C1255 510 1255 535 1255 580"/>
  <text x="1274" y="528" class="rel-label">1 image -> 1+ results</text>

  <!-- legend -->
  <g transform="translate(70 810)">
    <rect fill="#ffffff" stroke="#cbd5e1" width="390" height="105" rx="14"/>
    <text x="20" y="32" class="legend-title">Legend</text>
    <rect class="pk" x="20" y="48" width="22" height="22" rx="5"/>
    <text x="54" y="65" class="legend-text">Primary key</text>
    <rect class="fk" x="170" y="48" width="22" height="22" rx="5"/>
    <text x="204" y="65" class="legend-text">Foreign key</text>
    <line x1="20" y1="88" x2="74" y2="88" class="rel"/>
    <text x="92" y="93" class="legend-text">Relationship direction</text>
  </g>
</svg>
